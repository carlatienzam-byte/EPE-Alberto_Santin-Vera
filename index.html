<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Documento</title>
     <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
     <script src="https://unpkg.com/aframe-event-set-component@5.x.x/dist/aframe-event-set-component.min.js"></script>
</head>
<body>
    <!-- animation="property: rotation; to: 0 360 0; loop: true; dur: 700000; easing: linear" -->
    <a-scene>

        <a-camera>
            <a-cursor></a-cursor>
        </a-camera>

        <a-gltf-model id="Mazda" src="low_poly_mazda_mx-5_miata_na_update_opt.glb" rotation="0 -90 0" position="-5 0 2" scale="1 1 1" sound="src: #Rotativo; on:mouseenter"></a-gltf-model>
        <a-gltf-model id="Gasolinera" src="retro-futuristic_gas_station_opt.glb" position="0 0 0" scale="1 1 1"></a-gltf-model>
        <a-gltf-model id="Camion" src="truck_opt.glb" rotation="0 -20 0" position="-29 2.3 20" scale="1 1 1" sound="src: #Camion1; on:mouseenter"></a-gltf-model>
        <a-gltf-model id="Sol1" src="Sol_opt.glb" position="-120 200 160" opacity="0.5" scale="0.5 0.5 0.5"></a-gltf-model>
        <a-gltf-model id="Cielo" src="cielo_opt.glb" position="0 0 0" scale="300 300 300"></a-gltf-model>
        
        <a-cylinder color="red" position="0 1 4.34" scale="0.2 0.2 0.2" event-set__enter="_event: mouseenter; color: green" event-set__leave="_event: mouseleave; color: red" ></a-cylinder>


        <a-light id="Sol2" type="point" color="#FFFFFF" position="-120 200 160" intensity="1000"></a-light>
        <a-light id="ambiente" type="ambient" color="#FFFFFF" intensity="1"></a-light>
        <a-light id="Gasolinera1" type="point" color="#F0E68C" position="14.6 7.3 14.4" intensity="30"></a-light>
        <a-light id="Gasolinera2" type="point" color="#F0E68C" position="14.6 7.3 2.5" intensity="30"></a-light>
        <a-light id="Gasolinera3" type="point" color="#F0E68C" position="14.6 7.3 26.6" intensity="30"></a-light>
        <a-light id="Gasolinera4" type="point" color="#F0E68C" position="-0.3 7.3 14.4" intensity="30"></a-light>
        <a-light id="Gasolinera5" type="point" color="#F0E68C" position="-0.3 7.3 2.5" intensity="30"></a-light>
        <a-light id="Gasolinera6" type="point" color="#F0E68C" position="-0.3 7.3 26.6" intensity="30"></a-light>
  

        <a-assets>
            <a-sound id="Rotativo" src="rotativo.mp3"></a-sound>
            <a-sound id="Camion1"   src="camion.mp3"  ></a-sound>
        </a-assets>
        

        <a-box position="-27 0 20" scale="1 1 1" color="red" rotation="0 -20 0 "
            event-set__enter="_event: mouseenter; _target: #cartel; visible: true"
            event-set__leave="_event: mouseleave; _target: #cartel; visible: false">
            <a-box id="cartel" src="image-12-768x432-1.png" color="#FFFFFF" visible="false" position="1 3 0" scale=" 0 4 8"></a-box>
        </a-box>
    </a-scene>
</body>
</html>
